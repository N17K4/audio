# ── Docker 開発モード ─────────────────────────────────────────────────────────
# 使い方: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# ・ローカルソースをマウント → コンテナ内で即時反映
# ・バックエンド: uvicorn --reload（Python ファイル変更で自動リロード）
# ・フロントエンド: next dev（HMR ホットリロード）
# ・本番と同じ Docker 環境（OS / 依存 / パス）で開発可能
services:
  backend:
    volumes:
      - ./backend:/app/backend
      - ./tests:/app/tests
      - ./runtime/checkpoints:/app/runtime/checkpoints
      - user_data:/app/user_data
      - cache:/app/cache
      - ./logs:/app/logs
    command: >
      python -m uvicorn backend.main:app
        --host 0.0.0.0 --port 8000 --reload
        --reload-dir /app/backend
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - RESOURCES_ROOT=/app
      - CHECKPOINTS_DIR=/app/runtime/checkpoints
      - USER_DATA_ROOT=/app/user_data
      - CACHE_DIR=/app/cache
      - LOGS_DIR=/app/logs

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.dev.Dockerfile
    ports: !override
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: pnpm dev --hostname 0.0.0.0 --port 3000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  checkpoints:
  user_data:
  cache:
  logs:
  frontend_node_modules:
