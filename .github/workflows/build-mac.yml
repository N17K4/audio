name: macOS runner 构建 macOS + Windows 安装包

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-14   # Apple Silicon (arm64)，与发布包架构一致
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      # ── 1. 拉代码 ────────────────────────────────────────────────────────────
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 2. 准备 Node 环境 ─────────────────────────────────────────────────────
      # ── 3. 执行统一 setup 脚本 ──────────────────────────────────────────────────
      # setup.sh 包含：
      #   - 安装 mise（工具版本管理）
      #   - mise install — 安装 Node.js、Python、Poetry 等
      #   - pnpm install — 安装前端依赖
      #   - poetry install — 安装后端依赖
      #   - setup_base.py — 下载嵌入式 Python、backend 依赖、引擎 pip_packages、FFmpeg
      - name: 执行 setup.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/setup.sh

      # ── 4. 构建（dist.sh 构建 macOS + Windows）────────────────────────────────
      - name: 构建（dist.sh --both）
        run: bash scripts/dist.sh --both

      # ── 5. 并行上传四个任务（始终执行）──────────────────────────────────────
      # 任务1: macOS 安装包 → GitHub Release
      # 任务2: Windows 安装包 → 又拍云
      # 任务3: Windows 安装包 → GitHub Release
      # 任务4: 两个安装包 → GitHub Artifacts 备份
      - name: 并行上传到 Release、又拍云和 Artifacts
        if: always()
        env:
          UPYUN_OPERATOR: ${{ secrets.UPYUN_OPERATOR }}
          UPYUN_PASSWORD: ${{ secrets.UPYUN_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # 任务1: macOS → Release
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            bash scripts/upload.sh --mac --release-only &
          fi

          # 任务2: Windows → 又拍云
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            bash scripts/upload.sh --win --upyun-only &
          fi

          # 任务3: Windows → Release
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            bash scripts/upload.sh --win --release-only &
          fi

          # 等所有上传完成
          wait

      # ── 6. 上传为 GitHub Artifacts 备份（任务4）─────────────────────────────
      - name: 上传安装包为 GitHub Artifacts 备份
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: releases-${{ github.ref_name }}
          path: |
            AI-Workshop-mac-*.zip
            AI-Workshop-win-*.zip
          retention-days: 30
