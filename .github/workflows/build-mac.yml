name: 生产级双端构建与并行分发

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── 阶段 1: 构建 (昂贵的 Mac 资源只用在这里) ──────────────────────
  build:
    name: 🏗️ 核心构建 (macOS 14)
    runs-on: macos-14
    timeout-minutes: 120
    permissions:
      contents: write
    outputs:
      tag_name: ${{ github.ref_name }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 执行 setup.sh (环境初始化)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/setup.sh

      - name: 执行 dist.sh (生成双端安装包)
        run: bash scripts/dist.sh --both

      - name: 压缩为 ZIP (macOS + Windows)
        run: |
          TAG="${{ github.ref_name }}"
          TAG="${TAG#v}"
          [ -z "$TAG" ] && TAG="dev"

          # macOS
          if [ -d "dist/mac-arm64/AI Workshop.app" ]; then
            echo "📦 压缩 macOS..."
            ditto -c -k --sequesterRsrc --keepParent "dist/mac-arm64/AI Workshop.app" "AI-Workshop-mac-${TAG}.zip"
            ls -lh "AI-Workshop-mac-${TAG}.zip"
          fi

          # Windows
          if [ -d "dist/win-unpacked" ]; then
            echo "📦 压缩 Windows..."
            mv "dist/win-unpacked" "dist/AI-Workshop"
            if command -v 7z &> /dev/null; then
              (cd dist && 7z a -tzip "../AI-Workshop-win-${TAG}.zip" "AI-Workshop")
            else
              (cd dist && tar -czf "../AI-Workshop-win-${TAG}.tar.gz" "AI-Workshop")
            fi
            ls -lh "AI-Workshop-"*
          fi

      - name: 存储 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: AI-Workshop-mac
          path: AI-Workshop-mac-*.zip
          if-no-files-found: error
          retention-days: 30

      - name: 存储 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: AI-Workshop-win
          path: AI-Workshop-win-*.zip
          if-no-files-found: error
          retention-days: 30

  # ─── 阶段 2: 三路并行分发 (3 个独立虚拟机 × 独立带宽) ────────────────────
  publish:
    name: '🚀 ${{ matrix.target }}'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false  # 关键：任一失败不影响其他，三个任务完全独立
      matrix:
        include:
          # - target: upyun
          #   upload_args: --win --upyun-only --no-compress
          - target: mac-release
            upload_args: --mac --release-only --no-compress
          - target: win-release
            upload_args: --win --release-only --no-compress
    steps:
      - name: 检出脚本
        uses: actions/checkout@v4

      - name: 下载 macOS 产物
        if: matrix.target == 'mac-release'
        uses: actions/download-artifact@v4
        with:
          name: AI-Workshop-mac
          path: ./assets-temp

      - name: 下载 Windows 产物
        if: matrix.target != 'mac-release'
        uses: actions/download-artifact@v4
        with:
          name: AI-Workshop-win
          path: ./assets-temp

      - name: 准备上传环境 (移动 ZIP 到根目录)
        run: |
          echo "━━━━━━ 下载的产物结构 ━━━━━━"
          find ./assets-temp -type f
          echo "━━━━━━ 移动 ZIP 到根目录 ━━━━━━"
          find ./assets-temp -name "*.zip" -exec mv {} . \;
          ls -lh *.zip

      # # ── 任务1: Windows → 又拍云 ──────────────────────────────────────
      # - name: 📤 Windows → 又拍云
      #   if: matrix.target == 'upyun'
      #   env:
      #     UPYUN_OPERATOR: ${{ secrets.UPYUN_OPERATOR }}
      #     UPYUN_PASSWORD: ${{ secrets.UPYUN_PASSWORD }}
      #     TAG_NAME: ${{ github.ref_name }}
      #   run: bash scripts/upload.sh ${{ matrix.upload_args }}

      # ── 任务2: macOS → GitHub Release ───────────────────────────────
      - name: 📋 macOS → GitHub Release
        if: matrix.target == 'mac-release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: bash scripts/upload.sh ${{ matrix.upload_args }}

      # ── 任务3: Windows → GitHub Release ─────────────────────────────
      - name: 📋 Windows → GitHub Release
        if: matrix.target == 'win-release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: bash scripts/upload.sh ${{ matrix.upload_args }}

  # ─── 阶段 3: 状态汇总 ────────────────────────────────────────────────
  summary:
    name: ✅ 构建完成
    needs: [build, publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 汇总状态
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ 构建流水线执行完毕"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 产物："
          echo "   - macOS: AI-Workshop-mac-${{ github.ref_name }}.zip"
          echo "   - Windows: AI-Workshop-win-${{ github.ref_name }}.zip"
          echo "🚀 分发："
          echo "   - ✓ GitHub Release (macOS + Windows)"
          echo "   - ✓ 又拍云 (Windows) [已暂停]"
          echo "   - ✓ GitHub Artifacts (macOS + Windows 独立下载)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
