name: 生产级双端构建与并行分发

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # ─── 阶段 1: 构建 (昂贵的 Mac 资源只用在这里) ──────────────────────
  build:
    name: 🏗️ 核心构建 (macOS 14)
    runs-on: macos-14
    timeout-minutes: 120
    permissions:
      contents: write
    outputs:
      tag_name: ${{ github.ref_name }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 执行 setup.sh (环境初始化)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/setup.sh

      - name: 执行 dist.sh (生成双端安装包)
        run: bash scripts/dist.sh --both

      - name: 临时存储产物 (供后续并行任务使用)
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: |
            AI-Workshop-mac-*.zip
            AI-Workshop-win-*.zip
          retention-days: 1  # 临时中转，1天即删

  # ─── 阶段 2: 并行分发 (切换到便宜的 Linux 资源) ─────────────────────
  publish:
    name: '🚀 分发: ${{ matrix.target }}'
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # 关键：任一失败不影响其他，三个任务互不阻塞
      matrix:
        target: [upyun, github-release, artifacts-backup]
    steps:
      - name: 检出脚本
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: build-assets
          path: ./

      # ── 任务1: 上传到又拍云 ──────────────────────────────────────────
      - name: 📤 上传 Windows 到又拍云
        if: matrix.target == 'upyun'
        env:
          UPYUN_OPERATOR: ${{ secrets.UPYUN_OPERATOR }}
          UPYUN_PASSWORD: ${{ secrets.UPYUN_PASSWORD }}
          TAG_NAME: ${{ github.ref_name }}
        run: bash scripts/upload.sh --win --upyun-only

      # ── 任务2: 发布到 GitHub Release ─────────────────────────────────
      - name: 📋 发布到 GitHub Release (macOS + Windows)
        if: matrix.target == 'github-release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          bash scripts/upload.sh --mac --release-only
          bash scripts/upload.sh --win --release-only

      # ── 任务3: 备份 Artifacts ────────────────────────────────────────
      - name: 💾 归档为 GitHub Artifacts
        if: matrix.target == 'artifacts-backup'
        uses: actions/upload-artifact@v4
        with:
          name: releases-${{ github.ref_name }}
          path: ./*.zip
          retention-days: 30

  # ─── 阶段 3: 状态汇总 ────────────────────────────────────────────────
  summary:
    name: ✅ 构建完成
    needs: [build, publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 汇总状态
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ 构建流水线执行完毕"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 产物："
          echo "   - macOS: AI-Workshop-mac-${{ github.ref_name }}.zip"
          echo "   - Windows: AI-Workshop-win-${{ github.ref_name }}.zip"
          echo "🚀 分发："
          echo "   - ✓ GitHub Release (macOS + Windows)"
          echo "   - ✓ 又拍云 (Windows)"
          echo "   - ✓ GitHub Artifacts (备份)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
