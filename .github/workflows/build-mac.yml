name: macOS runner 构建 macOS + Windows 安装包

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-14   # Apple Silicon (arm64)，与发布包架构一致
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      # ── 1. 拉代码 ────────────────────────────────────────────────────────────
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 2. 准备 Node 环境 ─────────────────────────────────────────────────────
      # ── 3. 执行统一 setup 脚本 ──────────────────────────────────────────────────
      # setup.sh 包含：
      #   - 安装 mise（工具版本管理）
      #   - mise install — 安装 Node.js、Python、Poetry 等
      #   - pnpm install — 安装前端依赖
      #   - poetry install — 安装后端依赖
      #   - setup_base.py — 下载嵌入式 Python、backend 依赖、引擎 pip_packages、FFmpeg
      - name: 执行 setup.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/setup.sh

      # ── 4. 构建（dist.sh 构建 macOS + Windows）────────────────────────────────
      - name: 构建（dist.sh --both）
        run: bash scripts/dist.sh --both

      # ── 5. 上传 macOS 到 GitHub Release（tag 触发时）──────────────────────────
      - name: 上传 macOS 到 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: bash scripts/upload.sh --mac --release-only

      # ── 6. 上传 Windows 到又拍云和 GitHub Release（tag 触发时）──────────────────
      - name: 上传 Windows 到又拍云和 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          UPYUN_OPERATOR: ${{ secrets.UPYUN_OPERATOR }}
          UPYUN_PASSWORD: ${{ secrets.UPYUN_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: bash scripts/upload.sh --win

      # ── 6. 上传为 Artifact（始终执行，作为备份）──────────────────────────
      - name: 上传为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30
