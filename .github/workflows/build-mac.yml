name: 构建 macOS 安装包

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-14   # Apple Silicon (arm64)，与发布包架构一致
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      # ── 1. 拉代码 ────────────────────────────────────────────────────────────
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 2. 准备 Node 环境 ─────────────────────────────────────────────────────
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 pnpm
        run: npm install -g pnpm

      # ── 3. 创建嵌入式 Python 虚拟环境 ────────────────────────────────────────
      - name: 准备 Mac 嵌入式 Python（venv）
        run: |
          python3 --version
          python3 -m venv runtime/mac/python
          runtime/mac/python/bin/python3 -m pip install --upgrade pip --quiet
          runtime/mac/python/bin/python3 -m pip --version

      # ── 4. 安装 Node 依赖 + Python 后端依赖（不含引擎 requirements.txt）────────
      - name: 安装依赖（pnpm install + setup-runtime）
        run: |
          pnpm install
          cd frontend && pnpm install && cd ..
          node scripts/setup-runtime.js

      # ── 6. 构建前端静态文件 ───────────────────────────────────────────────────
      - name: 构建前端
        run: pnpm run build:frontend

      # ── 8. electron-builder 打包 macOS ───────────────────────────────────────
      - name: 打包 Electron（macOS）
        run: npx electron-builder --mac

      # ── 9. 压缩产物（ditto 保留 Mac 扩展属性和符号链接）─────────────────────
      - name: 压缩 dist
        run: |
          TAG="${{ github.ref_name }}"
          [ -z "$TAG" ] && TAG="dev"
          ZIP_NAME="AI-Tool-mac-${TAG}.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/mac-arm64/AI Tool.app" "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          du -sh "$ZIP_NAME"

      # ── 10a. 创建 GitHub Release 并上传安装包（tag 触发时）─────────────────
      - name: 创建 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}
          body: |
            ## 下载说明

            **macOS（Apple Silicon）安装包已附在本页面的 Assets 中。**

            > AI 模型（约 6 GB）将在首次启动时弹窗引导下载，支持设置 HuggingFace 镜像。

            **首次打开提示"已损坏"时**，在终端执行：
            ```bash
            xattr -cr "/Applications/AI Tool.app"
            ```

      # ── 10b. 上传为 Artifact（始终执行，作为备份）──────────────────────────
      - name: 上传为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30
