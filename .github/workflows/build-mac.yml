name: 生产级双端构建与并行分发

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # ─── 阶段 1: 构建 (昂贵的 Mac 资源只用在这里) ──────────────────────
  build:
    name: 🏗️ 核心构建 (macOS 14)
    runs-on: macos-14
    timeout-minutes: 120
    permissions:
      contents: write
    outputs:
      tag_name: ${{ github.ref_name }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 执行 setup.sh (环境初始化)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/setup.sh

      - name: 执行 dist.sh (生成双端安装包)
        run: bash scripts/dist.sh --both

      - name: 提取 ZIP 到根目录
        run: mv dist/**/*.zip . 2>/dev/null || true

      - name: 临时存储产物 (供后续并行任务使用)
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: AI-Workshop-*.zip
          retention-days: 1  # 临时中转，1天即删

  # ─── 阶段 2a: Artifact 序列化下载 (避免竞态条件) ────────────────────
  prepare-artifacts:
    name: 📦 准备分发产物
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: build-assets

      - name: 转存为中间 artifact (供分发任务使用)
        uses: actions/upload-artifact@v4
        with:
          name: publish-assets
          path: AI-Workshop-*.zip
          retention-days: 1

  # ─── 阶段 2b: 四路并行分发 (4 个独立虚拟机 × 独立带宽) ─────────────────
  publish:
    name: '🚀 ${{ matrix.target }}'
    needs: prepare-artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # 关键：任一失败不影响其他，四个任务完全独立
      matrix:
        # 直接拆成 4 个并行任务，每个都是独立的虚拟机
        target: [upyun, mac-release, win-release, artifacts-backup]
    steps:
      - name: 检出脚本
        uses: actions/checkout@v4

      - name: 下载分发产物
        uses: actions/download-artifact@v4
        with:
          name: publish-assets

      # ── 任务1: Windows → 又拍云 ──────────────────────────────────────
      - name: 📤 Windows → 又拍云
        if: matrix.target == 'upyun'
        env:
          UPYUN_OPERATOR: ${{ secrets.UPYUN_OPERATOR }}
          UPYUN_PASSWORD: ${{ secrets.UPYUN_PASSWORD }}
          TAG_NAME: ${{ github.ref_name }}
        run: bash scripts/upload.sh --win --no-compress

      # ── 任务2: macOS → GitHub Release ───────────────────────────────
      - name: 📋 macOS → GitHub Release
        if: matrix.target == 'mac-release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: bash scripts/upload.sh --mac --no-compress

      # ── 任务3: Windows → GitHub Release ─────────────────────────────
      - name: 📋 Windows → GitHub Release
        if: matrix.target == 'win-release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: bash scripts/upload.sh --win --no-compress

      # ── 任务4: 两个 ZIP → GitHub Artifacts 备份 ──────────────────────
      - name: 💾 Artifacts 备份
        if: matrix.target == 'artifacts-backup'
        uses: actions/upload-artifact@v4
        with:
          name: releases-${{ github.ref_name }}
          path: AI-Workshop-*.zip
          retention-days: 30

  # ─── 阶段 3: 状态汇总 ────────────────────────────────────────────────
  summary:
    name: ✅ 构建完成
    needs: [build, publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 汇总状态
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ 构建流水线执行完毕"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 产物："
          echo "   - macOS: AI-Workshop-mac-${{ github.ref_name }}.zip"
          echo "   - Windows: AI-Workshop-win-${{ github.ref_name }}.zip"
          echo "🚀 分发："
          echo "   - ✓ GitHub Release (macOS + Windows)"
          echo "   - ✓ 又拍云 (Windows)"
          echo "   - ✓ GitHub Artifacts (备份)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
