name: 构建 Windows 安装包

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      # ── 1. 拉代码 ────────────────────────────────────────────────────────────
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 2. 准备 Node 环境 ─────────────────────────────────────────────────────
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 pnpm
        run: npm install -g pnpm

      # ── 3. 下载并解压 Windows 嵌入式 Python 3.10 ─────────────────────────────
      # 使用 3.10：rvc-python 在 3.10 上兼容性最好；fairseq 无 Windows 预编译 wheel，
      # setup-engines.py 会下载源码并剥离 C 扩展后安装纯 Python 部分
      - name: 准备 Windows 嵌入式 Python
        shell: pwsh
        run: |
          $ver  = "3.10.11"
          $dest = "runtime\win\python"
          $url  = "https://www.python.org/ftp/python/$ver/python-$ver-embed-amd64.zip"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "python-embed.zip"
          Expand-Archive -Path "python-embed.zip" -DestinationPath $dest -Force
          Remove-Item "python-embed.zip"
          $pth = "$dest\python310._pth"
          (Get-Content $pth) -replace '#import site', 'import site' | Set-Content $pth
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py"
          & "$dest\python.exe" get-pip.py --quiet
          Remove-Item "get-pip.py"
          & "$dest\python.exe" -m pip --version
          & "$dest\python.exe" -m pip install setuptools wheel tomli --quiet

      # ── 4. 安装 Node 依赖 + Python 后端依赖（不含引擎 requirements.txt）────────
      - name: 安装依赖（pnpm install + setup-runtime）
        run: |
          pnpm install
          cd frontend && pnpm install && cd ..
          node scripts/setup-runtime.js

      # ── 6. 构建前端静态文件 ───────────────────────────────────────────────────
      - name: 构建前端
        run: pnpm run build:frontend

      # ── 8. electron-builder 打包 Windows ─────────────────────────────────────
      - name: 打包 Electron（Windows）
        run: npx electron-builder --win

      # ── 9. 压缩产物 ───────────────────────────────────────────────────────────
      - name: 压缩 dist
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag -or $tag -eq "") { $tag = "dev" }
          $zipName = "AI-Tool-win-$tag.zip"
          $distDir = Get-ChildItem -Path "dist" -Directory | Where-Object { $_.Name -like "*unpacked*" } | Select-Object -First 1 -ExpandProperty FullName
          if (-not $distDir) { Write-Error "dist 下未找到 *unpacked 目录"; exit 1 }
          Write-Host "压缩目录：$distDir"
          & "C:\Program Files\7-Zip\7z.exe" a -tzip "$zipName" "$distDir\*"
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          $size = (Get-Item $zipName).Length / 1GB
          Write-Host "打包完成：$zipName（$([math]::Round($size,2)) GB）"

      # ── 11a. 创建 GitHub Release 并上传安装包（tag 触发时）─────────────────
      - name: 创建 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}
          body: |
            ## 下载说明

            **Windows 安装包已附在本页面的 Assets 中。**

            > AI 模型（约 6 GB）将在首次启动时弹窗引导下载，支持设置 HuggingFace 镜像。

      # ── 11b. 上传为 Artifact（始终执行，作为备份）──────────────────────────
      - name: 上传为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30
