name: 构建 Windows 安装包

on:
  # 手动触发（在 Actions 页面点 Run workflow）
  workflow_dispatch:
  # 或者推送 v* tag 自动触发（如 git tag v1.0.0 && git push --tags）
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      # ── 1. 拉代码 ────────────────────────────────────────────────────────────
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 2. 准备 Node 环境 ─────────────────────────────────────────────────────
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 pnpm
        run: npm install -g pnpm

      # ── 3. 下载并解压 Windows 嵌入式 Python 3.12 ─────────────────────────────
      - name: 准备 Windows 嵌入式 Python
        shell: pwsh
        run: |
          $ver  = "3.12.9"
          $dest = "runtime\win\python"
          $url  = "https://www.python.org/ftp/python/$ver/python-$ver-embed-amd64.zip"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "python-embed.zip"
          Expand-Archive -Path "python-embed.zip" -DestinationPath $dest -Force
          Remove-Item "python-embed.zip"
          # 启用 site-packages：取消注释 _pth 里的 import site
          $pth = "$dest\python312._pth"
          (Get-Content $pth) -replace '#import site', 'import site' | Set-Content $pth
          # 安装 pip
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py"
          & "$dest\python.exe" get-pip.py --quiet
          Remove-Item "get-pip.py"
          & "$dest\python.exe" -m pip --version

      # ── 4. 安装 Node 依赖 + Python 后端/引擎依赖 ─────────────────────────────
      - name: 安装依赖（pnpm install + setup-runtime）
        run: |
          pnpm install
          cd frontend && pnpm install && cd ..
          node scripts/setup-runtime.js

      # ── 5. 下载模型 checkpoint ────────────────────────────────────────────────
      - name: 下载模型（checkpoints）
        shell: pwsh
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          & "runtime\win\python\python.exe" scripts/download_checkpoints.py

      # ── 6. 构建前端静态文件 ───────────────────────────────────────────────────
      - name: 构建前端
        run: pnpm run build:frontend

      # ── 7. electron-builder 打包 Windows ─────────────────────────────────────
      - name: 打包 Electron（Windows）
        run: npx electron-builder --win

      # ── 8. 压缩产物 ───────────────────────────────────────────────────────────
      - name: 压缩 dist
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag -or $tag -eq "") { $tag = "dev" }
          $zipName = "AI-Tool-win-$tag.zip"
          Compress-Archive -Path "dist\win-arm64-unpacked\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          $size = (Get-Item $zipName).Length / 1GB
          Write-Host "打包完成：$zipName（$([math]::Round($size,2)) GB）"

      # ── 9a. 上传到 GitHub Release（tag 触发时）───────────────────────────────
      - name: 上传到 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true

      # ── 9b. 上传为 Artifact（手动触发时，保留 30 天）─────────────────────────
      - name: 上传为 Artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30
