name: 构建 Windows 安装包

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - 'r*'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      # ── 1. 拉代码 ────────────────────────────────────────────────────────────
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 2. 准备 Node 环境 ─────────────────────────────────────────────────────
      # ── 3. 执行统一 setup 脚本 ──────────────────────────────────────────────────
      # setup.sh 包含：
      #   - 安装 mise（工具版本管理）
      #   - mise install — 安装 Node.js、Python、Poetry 等
      #   - pnpm install — 安装前端依赖
      #   - poetry install — 安装后端依赖
      #   - setup_base.py — 下载嵌入式 Python、backend 依赖、引擎 pip_packages、FFmpeg
      - name: 执行 setup.sh
        run: bash scripts/setup.sh

      # ── 4. 构建（dist.sh 只负责：构建前端 + 打包 Electron）──────────────────
      - name: 构建（dist.sh --win）
        run: bash scripts/dist.sh --win

      # ── 5. 上传（upload.sh 负责：压缩 Zip + 上传到又拍云 + 创建 Release）────
      - name: 上传到又拍云和 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          UPYUN_AK: ${{ secrets.UPYUN_AK }}
          UPYUN_SK: ${{ secrets.UPYUN_SK }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/upload.sh --win

      # ── 6. 上传为 Artifact（始终执行，作为备份）────────────────────────────
      - name: 上传为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30
