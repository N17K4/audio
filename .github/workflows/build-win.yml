name: 构建 Windows 安装包

on:
  # 手动触发（在 Actions 页面点 Run workflow）
  workflow_dispatch:
  # 或者推送 v* tag 自动触发（如 git tag v1.0.0 && git push --tags）
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      # ── 1. 拉代码 ────────────────────────────────────────────────────────────
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 2. 准备 Node 环境 ─────────────────────────────────────────────────────
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 pnpm
        run: npm install -g pnpm

      # ── 3. 下载并解压 Windows 嵌入式 Python 3.12 ─────────────────────────────
      - name: 准备 Windows 嵌入式 Python
        shell: pwsh
        run: |
          $ver  = "3.12.9"
          $dest = "runtime\win\python"
          $url  = "https://www.python.org/ftp/python/$ver/python-$ver-embed-amd64.zip"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "python-embed.zip"
          Expand-Archive -Path "python-embed.zip" -DestinationPath $dest -Force
          Remove-Item "python-embed.zip"
          # 启用 site-packages：取消注释 _pth 里的 import site
          $pth = "$dest\python312._pth"
          (Get-Content $pth) -replace '#import site', 'import site' | Set-Content $pth
          # 安装 pip
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py"
          & "$dest\python.exe" get-pip.py --quiet
          Remove-Item "get-pip.py"
          & "$dest\python.exe" -m pip --version

      # ── 4. 安装 Node 依赖 + Python 后端/引擎依赖 ─────────────────────────────
      - name: 安装依赖（pnpm install + setup-runtime）
        run: |
          pnpm install
          cd frontend && pnpm install && cd ..
          node scripts/setup-runtime.js

      # ── 5. 构建前端静态文件 ───────────────────────────────────────────────────
      - name: 构建前端
        run: pnpm run build:frontend

      # ── 7. electron-builder 打包 Windows ─────────────────────────────────────
      - name: 打包 Electron（Windows）
        run: npx electron-builder --win

      # ── 8. 压缩产物 ───────────────────────────────────────────────────────────
      - name: 压缩 dist
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag -or $tag -eq "") { $tag = "dev" }
          $zipName = "AI-Tool-win-$tag.zip"
          # 动态找 electron-builder 实际输出目录（win-unpacked / win-ia32-unpacked 等）
          $distDir = Get-ChildItem -Path "dist" -Directory | Where-Object { $_.Name -like "*unpacked*" } | Select-Object -First 1 -ExpandProperty FullName
          if (-not $distDir) { Write-Error "dist 下未找到 *unpacked 目录，打包可能失败"; exit 1 }
          Write-Host "压缩目录：$distDir"
          # 用 7-Zip 替代 Compress-Archive，可靠性更好
          & "C:\Program Files\7-Zip\7z.exe" a -tzip "$zipName" "$distDir\*"
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          $size = (Get-Item $zipName).Length / 1GB
          Write-Host "打包完成：$zipName（$([math]::Round($size,2)) GB）"

      # ── 9a. 创建 GitHub Release（tag 触发时）────────────────────────────────
      # 安装包约 3 GB（Python runtime + 引擎代码，不含 checkpoints）
      # 可能超过 GitHub Release 单文件 2 GB 限制，用户从 Artifact 下载
      - name: 创建 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            > **下载安装包**：请前往本次构建的 [Actions 页面](../../actions)，在 Artifacts 区域下载 `${{ env.ZIP_NAME }}`。
            > Artifact 保留 30 天。
            > AI 模型（约 6 GB）将在首次启动时引导下载，支持 HuggingFace 镜像。

      # ── 9b. 上传为 Artifact（始终执行，保留 30 天）──────────────────────────
      - name: 上传为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30
