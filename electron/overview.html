<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>应用概览 / 模型管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    background: #1e1e2e;
    color: #cdd6f4;
    padding: 20px;
    user-select: none;
  }
  h1 {
    font-size: 16px;
    font-weight: 600;
    color: #cba6f7;
    margin-bottom: 18px;
    letter-spacing: 0.3px;
  }
  h2 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #6c7086;
    margin: 20px 0 10px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    text-align: left;
    font-size: 11px;
    color: #6c7086;
    padding: 4px 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  td {
    padding: 7px 10px;
    border-top: 1px solid #313244;
    vertical-align: middle;
  }
  tr:hover td { background: #292942; }
  .label { color: #cdd6f4; font-weight: 500; }
  .sublabel { color: #585b70; font-size: 11px; margin-top: 2px; }
  .size {
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: #a6e3a1;
    white-space: nowrap;
    min-width: 80px;
  }
  .size.zero { color: #585b70; }
  .bar-cell { width: 140px; padding-right: 6px; }
  .bar-bg {
    background: #313244;
    border-radius: 3px;
    height: 5px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    background: #89b4fa;
    transition: width 0.4s ease;
  }
  .bar-fill.yellow { background: #f9e2af; }
  .bar-fill.green  { background: #a6e3a1; }
  .bar-fill.mauve  { background: #cba6f7; }
  .bar-fill.teal   { background: #94e2d5; }
  .section-total td {
    border-top: 2px solid #45475a;
    color: #bac2de;
    font-weight: 600;
    font-size: 12px;
  }
  .section-total .size { color: #cba6f7; }
  #status-bar {
    margin-top: 14px;
    font-size: 11px;
    color: #6c7086;
    min-height: 16px;
  }
  .refresh-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 14px;
  }
  .btn-refresh {
    border: 1px solid #3d3d5c;
    border-radius: 5px;
    background: #2a2a3e;
    color: #89b4fa;
    padding: 5px 14px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-refresh:hover { opacity: 0.82; }
  .err { color: #f38ba8; padding: 16px 10px; }
</style>
</head>
<body>

<h1>应用概览 / 模型管理</h1>

<h2>磁盘占用</h2>
<table>
  <thead>
    <tr>
      <th style="width:42%">组件</th>
      <th style="text-align:right">大小</th>
      <th class="bar-cell"></th>
    </tr>
  </thead>
  <tbody id="disk-body">
    <tr><td colspan="3" style="color:#45475a;padding:16px 10px">正在计算…</td></tr>
  </tbody>
</table>

<div id="status-bar"></div>

<div class="refresh-row">
  <button class="btn-refresh" onclick="loadData()">刷新</button>
</div>

<script>
const COLOR_MAP = {
  python:             'yellow',
  fish_speech_engine: 'mauve',
  fish_speech_ckpt:   'mauve',
  seed_vc_engine:     'teal',
  seed_vc_ckpt:       'teal',
  whisper_engine:     'green',
  whisper_ckpt:       'green',
  rvc_ckpt:           'blue',
  models:             'yellow',
  logs:               'blue',
};

function fmt(bytes) {
  if (bytes <= 0) return '0 B';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
}

async function loadData() {
  const tbody = document.getElementById('disk-body');
  const statusEl = document.getElementById('status-bar');
  tbody.innerHTML = '<tr><td colspan="3" style="color:#45475a;padding:16px 10px">正在计算…</td></tr>';
  statusEl.textContent = '';

  const api = window.overviewAPI;
  if (!api) {
    tbody.innerHTML = '<tr><td colspan="3" class="err">preload 未就绪，请重新打开此窗口</td></tr>';
    return;
  }

  let data;
  try {
    data = await api.getDiskUsage();
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="3" class="err">获取数据失败：${e.message}</td></tr>`;
    return;
  }

  const maxSize = Math.max(1, ...data.map(r => r.size).filter(s => s > 0));
  let html = '';
  let total = 0;

  for (const row of data) {
    const pct = row.size > 0 ? Math.max(2, Math.round((row.size / maxSize) * 100)) : 0;
    const color = COLOR_MAP[row.key] || 'blue';
    const sizeClass = row.size === 0 ? 'zero' : '';
    total += row.size > 0 ? row.size : 0;

    html += `<tr>
      <td>
        <div class="label">${row.label}</div>
        ${row.sub ? `<div class="sublabel">${row.sub}</div>` : ''}
      </td>
      <td class="size ${sizeClass}">${fmt(row.size)}</td>
      <td class="bar-cell">
        <div class="bar-bg"><div class="bar-fill ${color}" style="width:${pct}%"></div></div>
      </td>
    </tr>`;
  }

  html += `<tr class="section-total">
    <td>合计</td>
    <td class="size">${fmt(total)}</td>
    <td></td>
  </tr>`;

  tbody.innerHTML = html;
  statusEl.textContent = '上次刷新：' + new Date().toLocaleTimeString();
}

loadData();
</script>
</body>
</html>
