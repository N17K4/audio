server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API → 后端（FastAPI） ────────────────────────────────────────────────
    # 前端 useBackend.ts 回退到 http://127.0.0.1:8000，
    # Docker 模式下改为同源访问，由 nginx 反向代理到 backend 容器。
    location /health     { proxy_pass http://backend:8000; }
    location /runtime    { proxy_pass http://backend:8000; }
    location /capabilities { proxy_pass http://backend:8000; }
    location /voices     { proxy_pass http://backend:8000; }
    location /jobs       { proxy_pass http://backend:8000; }
    location /convert    { proxy_pass http://backend:8000; }
    location /train      { proxy_pass http://backend:8000; }
    location /tasks      { proxy_pass http://backend:8000; }
    location /rag        { proxy_pass http://backend:8000; }
    location /agent      { proxy_pass http://backend:8000; }
    location /finetune   { proxy_pass http://backend:8000; }
    location /download   { proxy_pass http://backend:8000; }
    location /system     { proxy_pass http://backend:8000; }
    location /settings   { proxy_pass http://backend:8000; }
    location /hw-accel   { proxy_pass http://backend:8000; }

    # SSE 长连接支持
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    proxy_read_timeout 3600s;

    # 文件上传大小限制（音频/视频文件可能较大）
    client_max_body_size 500M;

    # ── 前端静态文件 ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
